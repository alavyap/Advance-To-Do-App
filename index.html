<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>Focused Todo</title>
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='16' fill='%238b5cf6'/%3E%3Ctext x='50%25' y='54%25' text-anchor='middle' dominant-baseline='middle' font-size='38'%3E%F0%9F%A7%A0%3C/text%3E%3C/svg%3E"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <div class="header">
        <div class="header-icons">
          <button
            class="icon-btn"
            id="focusModeBtn"
            type="button"
            aria-label="Toggle focused work"
            aria-pressed="false"
          >
            <i class="fa-solid fa-fire"></i>
          </button>
          <button
            class="icon-btn theme-toggle"
            id="themeToggleBtn"
            type="button"
            aria-label="Switch to dark theme"
            aria-pressed="false"
          >
            <i class="fa-solid fa-moon"></i>
          </button>
        </div>
      </div>

      <div class="main-content">
        <div class="title-section">
          <div class="greeting" id="greeting"></div>
          <h1>
            You've <span class="task-count" id="taskCount">0</span> tasks on
            Hold out of
            <span class="total-count" id="totalCount">0</span>
            <button
              class="add-btn"
              id="addTaskBtn"
              type="button"
              onclick="openAddTaskModal()"
            >
              <i class="fas fa-plus"></i> Add Task
            </button>
          </h1>
        </div>

        <div class="section">
          <div class="section-header"><h2>On Hold</h2></div>
          <div id="onHoldTasks"></div>
        </div>

        <div class="section">
          <div class="section-header">
            <h2>Completed</h2>
            <span class="badge badge-inactive">Inactive</span>
          </div>
          <div id="completedTasks"></div>
        </div>
      </div>

      <div class="sidebar">
        <div class="sidebar-section">
          <h3 class="sidebar-title">Task Insights</h3>
          <div class="stat-card circular-stat-card">
            <div class="stat-label">Completion Rate</div>
            <div
              class="circular-progress"
              id="completionProgress"
              style="--progress: 0deg; --accent: #8b5cf6"
              aria-label="Completion rate"
            >
              <div class="circular-progress-inner">
                <div class="stat-value" id="completionRateValue">0%</div>
              </div>
            </div>
          </div>
          <div class="stat-card circular-stat-card">
            <div class="stat-label"><b>Completed Tasks</b></div>
            <div
              class="circular-progress"
              id="completedProgress"
              style="--progress: 0deg; --accent: #10b981"
              aria-label="Completed tasks"
            >
              <div class="circular-progress-inner">
                <div class="stat-value" id="completedCount">0</div>
                <span class="circle-caption">Done</span>
              </div>
            </div>
          </div>
          <div class="stat-card circular-stat-card">
            <div class="stat-label"><b>Pending Tasks</b></div>
            <div
              class="circular-progress"
              id="pendingProgress"
              style="--progress: 0deg; --accent: #f59e0b"
              aria-label="Pending tasks"
            >
              <div class="circular-progress-inner">
                <div class="stat-value" id="pendingCount">0</div>
                <span class="circle-caption">Left</span>
              </div>
            </div>
          </div>
          <div class="stat-card task-summary-card">
            <div class="summary-row summary-total">
              <span class="summary-dot"></span>
              <span>Total Tasks</span>
              <strong id="totalTasks">0</strong>
            </div>
            <div class="summary-row summary-completed">
              <span class="summary-dot"></span>
              <span>Completed</span>
              <strong id="completedSummaryCount">0</strong>
            </div>
            <div class="summary-row summary-pending">
              <span class="summary-dot"></span>
              <span>Pending</span>
              <strong id="pendingSummaryCount">0</strong>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!--====================== Task Modal=== -->
    <div class="modal" id="taskModal">
      <div class="modal-content">
        <h2 class="modal-header">Add / Edit Task</h2>
        <form id="taskForm">
          <div class="form-group">
            <label>Task Title</label>
            <input
              type="text"
              id="taskTitle"
              placeholder="Enter task title"
              required
            />
          </div>
          <div class="form-group">
            <label>Status</label>
            <select id="taskStatus" required>
              <option value="pending">Pending</option>
              <option value="progress">In Progress</option>
              <option value="completed">Completed</option>
            </select>
          </div>
          <div class="form-group">
            <label>Priority</label>
            <select id="taskPriority" required>
              <option value="minor">Minor</option>
              <option value="normal">Normal</option>
              <option value="critical">Critical</option>
            </select>
          </div>
          <label class="focused-work-toggle">
            <input type="checkbox" id="focusedWork" />
            <span>Focused Work</span>
          </label>
          <div class="modal-actions">
            <button
              type="button"
              class="btn btn-secondary"
              onclick="closeModal()"
            >
              Cancel
            </button>
            <button type="submit" class="btn btn-primary">Save Task</button>
          </div>
        </form>
      </div>
    </div>

    <script type="module" src="script.js"></script>
  </body>
</html>
